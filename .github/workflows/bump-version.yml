name: Bump version

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  bump:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'fm/miniswar-version-f9'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Increment minor decimal version
        run: |
          set -euo pipefail
          version_file="internal/version/VERSION"
          current="$(tr -d '[:space:]' < "$version_file")"
          case "$current" in
            0.*) ;;
            *) echo "Unsupported version format: $current" >&2; exit 1 ;;
          esac
          minor="${current#0.}"
          case "$minor" in
            ''|*[!0-9]*) echo "Unsupported version format: $current" >&2; exit 1 ;;
          esac
          next="0.$((minor + 1))"
          printf '%s\n' "$next" > "$version_file"
      - name: Commit bumped version
        run: |
          set -euo pipefail
          if git diff --quiet -- internal/version/VERSION; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/version/VERSION
          git commit -m "Bump app version [skip ci]"
          git push
