<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miniswar</title>
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="/static/app.js"></script>
  <script defer src="/static/alpine.min.js"></script>
</head>
<body x-data="miniswar" x-init="initGame()">
  <header class="topbar">
    <div>
      <h1>Miniswar</h1>
      <p x-text="statusLine()"></p>
    </div>
    <div class="topbar-actions">
      <a class="button-link" href="/armies">Armies</a>
      <button type="button" @click="openBattlemapEditor()">Battlemaps</button>
      <button type="button" @click="openLoadGames()">Load Game</button>
      <button type="button" @click="openNewGameConfig()">New Game</button>
    </div>
  </header>

  <main class="shell" :class="{ 'setup-active': isSetupPhase(), 'setup-collapsed': setupSidebarCollapsed }">
    <section class="setup" :aria-label="setupSidebarCollapsed ? 'Setup collapsed' : 'Setup'">
      <button class="sidebar-toggle" type="button" @click="toggleSetupSidebar()" :aria-expanded="(!setupSidebarCollapsed).toString()" aria-controls="setup-sidebar-body">
        <span x-text="setupSidebarCollapsed ? '›' : '‹'"></span>
      </button>
      <div id="setup-sidebar-body" class="setup-body" x-show="!setupSidebarCollapsed">
        <section class="details-panel">
          <h2>Details</h2>
          <template x-if="!detailUnit()">
            <div class="detail-empty">
              <p x-text="detailInstructions()"></p>
              <ol class="placement-counts" x-show="isSetupPhase()">
                <template x-for="count in placementCounts()" :key="count.playerId">
                  <li>
                    <span x-text="`${count.remaining}/${count.total}`"></span>
                    <span x-text="`Army ${count.playerId}`"></span>
                  </li>
                </template>
              </ol>
            </div>
          </template>
          <template x-if="detailUnit()">
            <article class="unit-detail">
              <div class="unit-detail-head">
                <h3 x-text="detailUnit().name"></h3>
                <span x-text="`Player ${detailUnit().playerId}`"></span>
              </div>
              <p class="unit-detail-meta" x-text="unitDetailMeta(detailUnit())"></p>
              <dl class="stats-row compact">
                <template x-for="stat in unitStatsEntries(detailUnit())" :key="stat.label">
                  <div>
                    <dt x-text="stat.label"></dt>
                    <dd x-text="stat.value"></dd>
                  </div>
                </template>
              </dl>
              <dl class="unit-detail-list">
                <div>
                  <dt>Health</dt>
                  <dd x-text="unitHealthLabel(detailUnit())"></dd>
                </div>
                <div>
                  <dt>Move</dt>
                  <dd x-text="`${movementLimitForUnit(detailUnit())}mm`"></dd>
                </div>
                <div>
                  <dt>Status</dt>
                  <dd x-text="unitDetailStatus(detailUnit())"></dd>
                </div>
              </dl>
            </article>
          </template>
        </section>
      </div>
    </section>

    <section class="arena-panel">
      <div class="placement-hud" x-show="isSetupPhase()">
        <span x-text="selectedUnitLabel()"></span>
        <button type="button" @click="confirmPlacement()" :disabled="!placementPreview">Confirm</button>
        <span class="placement-message" x-text="messages[0] || ''"></span>
      </div>
      <div class="arena-toolbar">
        <button type="button" @click="fitCameraToMap()">Fit</button>
        <button type="button" @click="zoomCamera(0.8)">+</button>
        <button type="button" @click="zoomCamera(1.25)">-</button>
        <button type="button" @click="panCamera(-0.25, 0)" aria-label="Pan left">←</button>
        <button type="button" @click="panCamera(0.25, 0)" aria-label="Pan right">→</button>
        <button type="button" @click="panCamera(0, -0.25)" aria-label="Pan up">↑</button>
        <button type="button" @click="panCamera(0, 0.25)" aria-label="Pan down">↓</button>
      </div>
      <svg class="arena" :viewBox="arenaViewBox()" role="img" aria-label="Miniswar arena" @click.capture="arenaClicked($event)" @wheel.prevent="arenaWheel($event)">
        <defs>
          <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
            <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#d7d0c2" stroke-width="1"/>
          </pattern>
        </defs>
        <rect :width="battlemapWidth()" :height="battlemapHeight()" fill="#f4efe4"></rect>
        <rect :width="battlemapWidth()" :height="battlemapHeight()" fill="url(#grid)"></rect>
        <g x-ref="terrain"></g>
        <g x-ref="units"></g>
      </svg>
    </section>

    <section class="controls">
      <h2>Activation</h2>
      <div class="control-row">
        <button type="button" @click="activate()" :disabled="!canActivate()">Activate</button>
        <span x-text="selectedUnitLabel()"></span>
      </div>

      <h2>Actions</h2>
      <section class="combat-choice" x-show="pendingCombatChoice()" x-cloak>
        <h3>Combat Choice</h3>
        <p x-text="pendingCombatChoice() ? `${pendingCombatChoice().winningUnitId} won against ${pendingCombatChoice().losingUnitId}` : ''"></p>
        <div class="choice-grid">
          <template x-for="choice in pendingCombatChoice()?.choices || []" :key="choice">
            <button type="button" @click="resolveCombatChoice(choice)" x-text="combatChoiceLabel(choice)"></button>
          </template>
        </div>
      </section>
      <p class="target-line" x-text="pivotAxisLabel()"></p>
      <div class="action-grid">
        <label>Distance
          <input type="number" min="1" x-model.number="move.distanceMm">
        </label>
        <label>Direction
          <select x-model="move.direction">
            <option value="forward">forward</option>
            <option value="backward">backward</option>
          </select>
        </label>
        <button type="button" @click="takeAction('move')" :disabled="!canAct()">Move</button>
        <label>Pivot Deg
          <input type="number" min="0" max="359" x-model.number="pivot.facingDeg">
        </label>
        <button type="button" @click="takeAction('pivot')" :disabled="!canAct()">Pivot</button>
        <button type="button" @click="takeAction('about_face')" :disabled="!canAct()">About Face</button>
        <button type="button" @click="takeAction('skip')" :disabled="!canAct()">Skip</button>
      </div>

      <h2>Feedback</h2>
      <ol class="messages">
        <template x-for="message in messages" :key="message">
          <li x-text="message"></li>
        </template>
      </ol>

      <h2>History</h2>
      <ol class="history">
        <template x-for="action in game?.actionHistory || []" :key="action.index">
          <li>
            <button type="button" @click="rewind(action.index)">rewind</button>
            <span x-text="`${action.index}: ${action.type} ${action.unitId || ''}`"></span>
          </li>
        </template>
      </ol>
    </section>
  </main>

  <div class="modal-backdrop" x-show="newGameConfigOpen" @click.self="closeNewGameConfig()" x-cloak>
    <section class="modal setup-modal" role="dialog" aria-modal="true" aria-labelledby="new-game-title">
      <div class="modal-header">
        <h2 id="new-game-title">New Game</h2>
        <button type="button" @click="closeNewGameConfig()" x-show="game" aria-label="Close new game setup">Close</button>
      </div>
      <label>Battlemap
        <select x-model="setup.battlemapId" @change="fitCameraToMap(); renderArena()">
          <template x-for="battlemap in battlemaps" :key="battlemap.id">
            <option :value="battlemap.id" x-text="`${battlemap.name} (${Math.round(battlemap.widthMm)}x${Math.round(battlemap.heightMm)}mm)`"></option>
          </template>
        </select>
      </label>
      <div class="setup-grid">
        <div class="setup-player">
          <h3>Player 1</h3>
          <label>Army
            <select x-model="setup.player1ArmyId">
              <option value="">Manual fallback</option>
              <template x-for="army in armies" :key="`p1-${army.id}`">
                <option :value="army.id" x-text="`${army.name} (${army.totalPoints}/${army.targetPoints || 0} pts)`"></option>
              </template>
            </select>
          </label>
          <ol class="setup-units" x-show="!setup.player1ArmyId">
            <template x-for="(unit, index) in setup.player1.units" :key="`p1-${index}`">
              <li>
                <label>Base
                  <select x-model="unit.base">
                    <option value="25x25">25x25</option>
                    <option value="25x50">25x50</option>
                    <option value="50x50">50x50</option>
                    <option value="50x100">50x100</option>
                    <option value="100x50">100x50</option>
                  </select>
                </label>
                <label>Minis
                  <input type="number" min="1" max="20" x-model.number="unit.count">
                </label>
                <button type="button" @click="removeSetupUnit(1, index)" :disabled="setup.player1.units.length === 1">remove</button>
              </li>
            </template>
          </ol>
          <div class="setup-unit-add" x-show="!setup.player1ArmyId">
            <label>Base
              <select x-model="setup.player1.base">
                <option value="25x25">25x25</option>
                <option value="25x50">25x50</option>
                <option value="50x50">50x50</option>
                <option value="50x100">50x100</option>
                <option value="100x50">100x50</option>
              </select>
            </label>
            <label>Minis
              <input type="number" min="1" max="20" x-model.number="setup.player1.count">
            </label>
            <button type="button" @click="addSetupUnit(1)">Add unit</button>
          </div>
        </div>
        <div class="setup-player">
          <h3>Player 2</h3>
          <label>Army
            <select x-model="setup.player2ArmyId">
              <option value="">Manual fallback</option>
              <template x-for="army in armies" :key="`p2-${army.id}`">
                <option :value="army.id" x-text="`${army.name} (${army.totalPoints}/${army.targetPoints || 0} pts)`"></option>
              </template>
            </select>
          </label>
          <ol class="setup-units" x-show="!setup.player2ArmyId">
            <template x-for="(unit, index) in setup.player2.units" :key="`p2-${index}`">
              <li>
                <label>Base
                  <select x-model="unit.base">
                    <option value="25x25">25x25</option>
                    <option value="25x50">25x50</option>
                    <option value="50x50">50x50</option>
                    <option value="50x100">50x100</option>
                    <option value="100x50">100x50</option>
                  </select>
                </label>
                <label>Minis
                  <input type="number" min="1" max="20" x-model.number="unit.count">
                </label>
                <button type="button" @click="removeSetupUnit(2, index)" :disabled="setup.player2.units.length === 1">remove</button>
              </li>
            </template>
          </ol>
          <div class="setup-unit-add" x-show="!setup.player2ArmyId">
            <label>Base
              <select x-model="setup.player2.base">
                <option value="25x25">25x25</option>
                <option value="25x50">25x50</option>
                <option value="50x50">50x50</option>
                <option value="50x100">50x100</option>
                <option value="100x50">100x50</option>
              </select>
            </label>
            <label>Minis
              <input type="number" min="1" max="20" x-model.number="setup.player2.count">
            </label>
            <button type="button" @click="addSetupUnit(2)">Add unit</button>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" @click="createGame()">Confirm</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" x-show="loadGamesOpen" @click.self="closeLoadGames()" x-cloak>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="load-game-title">
      <div class="modal-header">
        <h2 id="load-game-title">Load Game</h2>
        <button type="button" @click="closeLoadGames()" aria-label="Close load game">Close</button>
      </div>
      <p class="modal-status" x-show="savedGamesLoading">Loading saved games...</p>
      <p class="modal-status" x-show="!savedGamesLoading && savedGames.length === 0">No saved games found.</p>
      <table class="games-table" x-show="!savedGamesLoading && savedGames.length > 0">
        <thead>
          <tr>
            <th>Date</th>
            <th>Map</th>
            <th>State</th>
            <th>Actions / Entries</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="saved in savedGames" :key="saved.id">
            <tr>
              <td>
                <span x-text="formatDate(saved.updatedAt)"></span>
              </td>
              <td x-text="saved.battlemap || saved.battlemapId"></td>
              <td x-text="`Round ${saved.round}, ${saved.phase}`"></td>
              <td x-text="`${saved.actionCount} / ${saved.snapshotCount}`"></td>
              <td>
                <button type="button" @click="loadGame(saved.id)">Load</button>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </section>
  </div>

  <div class="modal-backdrop" x-show="battlemapEditorOpen" @click.self="closeBattlemapEditor()" x-cloak>
    <section class="modal battlemap-modal" role="dialog" aria-modal="true" aria-labelledby="battlemap-editor-title">
      <div class="modal-header">
        <h2 id="battlemap-editor-title">Battlemaps</h2>
        <button type="button" @click="closeBattlemapEditor()" aria-label="Close battlemap editor">Close</button>
      </div>
      <div class="battlemap-editor">
        <aside class="battlemap-list">
          <button type="button" @click="newBattlemap()">New Battlemap</button>
          <template x-for="battlemap in battlemaps" :key="battlemap.id">
            <button type="button" :aria-label="`Edit ${battlemap.name}`" :class="{ selected: editorBattlemap?.id === battlemap.id }" @click="selectBattlemapForEdit(battlemap.id)">
              <span x-text="battlemap.name"></span>
              <small x-text="`${Math.round(battlemap.widthMm)}x${Math.round(battlemap.heightMm)}mm${battlemap.isBuiltin ? ' built-in' : ''}`"></small>
            </button>
          </template>
        </aside>
        <section class="battlemap-form" x-show="editorBattlemap">
          <div class="setup-grid compact">
            <label>Name
              <input type="text" x-model="editorBattlemap.name">
            </label>
            <label>Width mm
              <input type="number" min="1" x-model.number="editorBattlemap.widthMm">
            </label>
            <label>Height mm
              <input type="number" min="1" x-model.number="editorBattlemap.heightMm">
            </label>
          </div>
          <div class="battlemap-preview-row">
            <svg class="battlemap-preview" :viewBox="editorViewBox()" role="img" aria-label="Battlemap editor preview">
              <defs>
                <pattern id="editor-grid" width="25" height="25" patternUnits="userSpaceOnUse">
                  <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#d7d0c2" stroke-width="1"/>
                </pattern>
              </defs>
              <rect :width="editorBattlemap?.widthMm || 760" :height="editorBattlemap?.heightMm || 520" fill="#f4efe4"></rect>
              <rect :width="editorBattlemap?.widthMm || 760" :height="editorBattlemap?.heightMm || 520" fill="url(#editor-grid)"></rect>
              <template x-for="terrain in editorBattlemap?.terrains || []" :key="terrain.id">
                <g @click="selectedTerrainId = terrain.id">
                  <rect :x="terrain.x" :y="terrain.y" :width="terrain.width" :height="terrain.height" :class="`terrain ${terrain.type} ${selectedTerrainId === terrain.id ? 'selected' : ''}`"></rect>
                  <text :x="terrain.x + terrain.width / 2" :y="terrain.y + terrain.height / 2 + 4" text-anchor="middle" :class="`terrain-label ${terrain.type}`" x-text="terrain.label"></text>
                </g>
              </template>
            </svg>
            <div class="terrain-tools">
              <div class="modal-actions">
                <button type="button" @click="addEditorTerrain()">Add Terrain</button>
                <button type="button" @click="deleteEditorTerrain()" :disabled="!selectedTerrain()">Delete Terrain</button>
              </div>
              <template x-if="selectedTerrain()">
                <div class="terrain-form">
                  <label>Type
                    <select x-model="selectedTerrain().type">
                      <option value="path">path</option>
                      <option value="rough">rough</option>
                      <option value="impassable">impassable</option>
                      <option value="passable_obstacle">passable obstacle</option>
                    </select>
                  </label>
                  <label>Label
                    <input type="text" x-model="selectedTerrain().label">
                  </label>
                  <label>X
                    <input type="number" x-model.number="selectedTerrain().x">
                  </label>
                  <label>Y
                    <input type="number" x-model.number="selectedTerrain().y">
                  </label>
                  <label>Width
                    <input type="number" min="1" x-model.number="selectedTerrain().width">
                  </label>
                  <label>Height
                    <input type="number" min="1" x-model.number="selectedTerrain().height">
                  </label>
                </div>
              </template>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" @click="deleteEditorBattlemap()" :disabled="!editorBattlemap?.id || editorBattlemap?.isBuiltin">Delete Map</button>
            <button type="button" @click="saveEditorBattlemap()" :disabled="editorBattlemap?.isBuiltin">Save Map</button>
          </div>
        </section>
      </div>
    </section>
  </div>
</body>
</html>
